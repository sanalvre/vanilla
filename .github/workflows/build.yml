name: Build & Release

on:
  push:
    tags:
      - "v*"           # Trigger on version tags: v0.1.0, v1.2.3, etc.
  workflow_dispatch:   # Allow manual runs

permissions:
  contents: write      # Needed to create GitHub releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-ext: .exe

          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar-ext: ""

          - platform: macos-13
            target: x86_64-apple-darwin
            sidecar-ext: ""

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar-ext: ""

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── System deps (Linux only) ──────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      # ── Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python build deps
        run: pip install -r sidecar/requirements-build.txt

      - name: Build Python sidecar
        shell: bash
        run: |
          cd sidecar
          pyinstaller vanilla-sidecar.spec --noconfirm --clean
          mkdir -p ../src-tauri/binaries
          EXT="${{ matrix.sidecar-ext }}"
          cp "dist/vanilla-sidecar${EXT}" \
             "../src-tauri/binaries/vanilla-sidecar-${{ matrix.target }}${EXT}"

      # ── Node / Frontend ───────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      # ── Rust ──────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # ── Tauri build ───────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — set these secrets in your GitHub repo settings
          # macOS:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater signing key:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VanillaDB ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
